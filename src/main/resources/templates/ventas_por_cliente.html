<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <title>Estadísticas Empleados</title>
</head>

<body>
    <main>
        <div class="container px-4 py-5">
            <h1 class="pb-2 border-bottom">Ventas por Cliente</h1>
            <table class="table table-sm">
                <tr>
                    <th>Cliente</th>
                    <th>Cantidad de productos</th>
                    <th>Total</th>
                </tr>
                <tr th:each="empXreg : ${ventasPorCliente}">
                    <td th:text="${empXreg.companyName}"></td>
                    <td th:text="${empXreg.quantity}"></td>
                    <td th:text="${empXreg.total}"></td>
                </tr>
            </table>
        </div>
    </main>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
